<!doctype html>
{% load static %}
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link
      rel="stylesheet"
      href="{% static 'messenger/private_group_room.css' %}"
    />
    <title>{{ open_room.name }}</title>
  </head>
  <body>
    <div class="chat-page">
      <header class="chat-top">
        <p class="chat-back"><a href="{% url 'index' %}">← ルーム一覧</a></p>
        <div class="chat-header">
          <div class="chat-header-text">
            <h1>{{ open_room.name }}</h1>
            {% if open_room.description %}
            <p class="chat-members">{{ open_room.description }}</p>
            {% endif %}
            <p class="chat-members">
              <span class="chat-members-label">公開ルーム</span>
              — 誰でも参加・発言できます
            </p>
          </div>
        </div>
      </header>
      <main id="chat-log" class="chat-log"></main>
      <footer class="chat-bottom">
        <div class="chat-input-wrap">
          <input
            id="chat-message-input"
            type="text"
            placeholder="メッセージを入力"
          />
          <input id="chat-message-submit" type="button" value="送信" />
        </div>
      </footer>
    </div>
    {{ open_room.id|json_script:"room-id" }}
    {{ initial_messages|json_script:"initial-messages" }}
    <script>
      const roomId = JSON.parse(document.getElementById("room-id").textContent);
      const initialMessages = JSON.parse(
        document.getElementById("initial-messages").textContent,
      );
      const chatLog = document.querySelector("#chat-log");

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text ?? "";
        return div.innerHTML;
      }

      function formatTime(isoString) {
        if (!isoString) return "";
        const date = new Date(isoString);
        return date.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function appendMessage({ username, message, avatar_url, created_at }) {
        const row = document.createElement("div");
        row.className = "chat-message";
        row.innerHTML =
          '<img src="' +
          escapeHtml(avatar_url) +
          '" alt="" class="chat-avatar" width="25" height="25" />' +
          '<div class="chat-message-body">' +
          '<div class="chat-message-header">' +
          '<span class="chat-username">' +
          escapeHtml(username) +
          "</span>" +
          '<span class="chat-timestamp">' +
          escapeHtml(formatTime(created_at)) +
          "</span>" +
          "</div>" +
          '<div class="chat-text">' +
          escapeHtml(message) +
          "</div>" +
          "</div>";
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      initialMessages.forEach(appendMessage);
      chatLog.scrollTop = chatLog.scrollHeight;

      const wsScheme = window.location.protocol === "https:" ? "wss:" : "ws:";
      const chatSocket = new WebSocket(
        wsScheme + "//" + window.location.host + "/ws/chat/open/" + roomId + "/",
      );

      chatSocket.onmessage = function (e) {
        const data = JSON.parse(e.data);
        appendMessage(data);
      };

      chatSocket.onclose = function () {
        console.error("Chat socket closed unexpectedly");
      };

      document.querySelector("#chat-message-input").focus();
      document.querySelector("#chat-message-input").onkeyup = function (e) {
        if (e.keyCode === 13)
          document.querySelector("#chat-message-submit").click();
      };

      document.querySelector("#chat-message-submit").onclick = function () {
        const input = document.querySelector("#chat-message-input");
        const message = input.value.trim();
        if (message) {
          chatSocket.send(JSON.stringify({ message: message }));
          input.value = "";
        }
      };
    </script>
  </body>
</html>
